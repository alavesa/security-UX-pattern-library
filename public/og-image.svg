    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="2" fill="rgba(0,0,0,0.05)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Shield icon -->
  <g transform="translate(520, 80)">
    <path d="M80 0 L20 30 L20 80 C20 140 45 190 80 210 C115 190 140 140 140 80 L140 30 Z" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.3"/>
    <path d="M80 15 L30 40 L30 80 C30 130 50 175 80 195 C110 175 130 130 130 80 L130 40 Z" fill="none" stroke="#00ff41" stroke-width="4"/>
    <rect x="65" y="75" width="30" height="35" rx="4" fill="none" stroke="#00ff41" stroke-width="3"/>
    <path d="M70 75 L70 65 C70 55 75 48 80 48 C85 48 90 55 90 65 L90 75" fill="none" stroke="#00ff41" stroke-width="3"/>
